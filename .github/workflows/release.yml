name: Publish release

on:
  push:
    tags:
    - "*"

jobs:
  build-and-release:
    runs-on: windows-2025-vs2026

    steps:
      - name: Parse version from latest tag
        id: version
        uses: release-kit/semver@v2
        
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Create TeeChart license file from secret
        uses: lukasa1993/secret-file-action@v1.0.4
        id: teechart-license
        with:
          secret: ${{ secrets.TEECHARTLICENSE }}
          b64-decode: false
          
      - name: Copy TeeChart license file
        run: copy ${{ steps.teechart-license.outputs.file }} "My Project\TeeChart.licenses"
        
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Build project
        run: msbuild TENConverter.vbproj -restore /property:Configuration=Release
        
      - name: Create zip archive
        run: Compress-Archive -Path bin\Release\* -DestinationPath BlueM.TENConverter_${{ steps.version.outputs.full }}.zip
        
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.full }}"
          draft: true
          body: "[Full changelog](https://github.com/bluemodel/BlueM.TENConverter/blob/${{ steps.version.outputs.full }}/CHANGELOG.md)"
          files: |
            BlueM.TENConverter_${{ steps.version.outputs.full }}.zip